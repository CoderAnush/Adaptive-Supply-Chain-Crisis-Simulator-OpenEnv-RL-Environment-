spec_version: 1
name: supply_chain_simulator
type: space
runtime: fastapi
app: server.app:app
port: 7860
version: 1.0.0
description: Adaptive Global Supply Chain Crisis Simulator with Partial Observability and Uncertainty
author: openenv
tags: ["openenv"]

model_paths:
  observation: supply_chain.models:Observation
  action: supply_chain.models:Action
  reward: supply_chain.models:Reward
  state: supply_chain.models:State

tasks:
  - id: task_easy
    name: "Steady State Management"
    difficulty: easy
    tags: ["eval"]
    description: "Easy task with predictable demand and no crises."
    grader: supply_chain.graders:grade_steady_state
    
  - id: task_medium
    name: "Route Blockage Response"
    difficulty: medium
    tags: ["eval"]
    description: "Medium task introducing fixed route blockages."
    grader: supply_chain.graders:grade_suez_blockage
    
  - id: task_hard
    name: "Black Swan Crisis"
    difficulty: hard
    tags: ["eval"]
    description: "Hard task with extreme, stochastic multi-modal crises."
    grader: supply_chain.graders:grade_black_swan