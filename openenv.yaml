name: supply_chain_simulator
version: 1.0.0
description: Adaptive Global Supply Chain Crisis Simulator with Partial Observability and Uncertainty
author: openenv
model_paths:
  observation: supply_chain.models:Observation
  action: supply_chain.models:Action
  reward: supply_chain.models:Reward
  state: supply_chain.models:State
tasks:
  - id: steady_state
    description: Easy task with predictable demand and no crises.
  - id: suez_blockage
    description: Medium task introducing fixed route blockages.
  - id: black_swan
    description: Hard task with extreme, stochastic multi-modal crises.